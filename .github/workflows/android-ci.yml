name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build native .so per ABI ──────────────────────────────────────────────
  build-native:
    name: Build native lib (${{ matrix.abi }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Configure CMake (${{ matrix.abi }})
        run: |
          cmake -S app/src/main/cpp \
                -B build/${{ matrix.abi }} \
                -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
                -DANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653 \
                -DANDROID_ABI=${{ matrix.abi }} \
                -DANDROID_PLATFORM=android-21 \
                -DANDROID_STL=c++_shared \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build native library (${{ matrix.abi }})
        run: cmake --build build/${{ matrix.abi }} -- -j$(nproc)

      - name: Collect .so artifact
        run: |
          mkdir -p artifacts
          find build/${{ matrix.abi }} -name "libimgui_demo.so" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload native libs (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.abi }}
          path: artifacts/libimgui_demo.so
          if-no-files-found: error

  # ── Build debug APK (fat: all ABIs) ───────────────────────────────────────
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-native   # optional: remove if you want parallel runs

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

